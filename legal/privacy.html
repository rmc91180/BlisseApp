<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Policy - Blisse</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1A0F24 0%, #2D1B3D 100%);
            min-height: 100vh;
            color: #FFF8E7;
            line-height: 1.6;
        }
        .container { max-width: 920px; margin: 0 auto; padding: 32px 20px 44px; }
        .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; gap: 14px; }
        .logo a { text-decoration: none; color: inherit; }
        .logo h1 {
            font-size: 42px;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .language-select {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #FFF8E7;
            border-radius: 10px;
            padding: 8px 10px;
            font-size: 13px;
            font-weight: 600;
        }
        .card {
            background: rgba(45, 27, 61, 0.82);
            border-radius: 16px;
            padding: 28px;
            border: 1px solid rgba(168, 85, 247, 0.2);
        }
        h2 { font-size: 30px; margin-bottom: 6px; }
        .date { color: #9CA3AF; font-size: 14px; margin-bottom: 20px; }
        .intro {
            background: rgba(168, 85, 247, 0.14);
            border-left: 4px solid #a855f7;
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #FFF8E7;
        }
        .section { margin-top: 18px; }
        .section h3 { font-size: 18px; color: #c084fc; margin-bottom: 8px; }
        .section p { color: #D1D5DB; white-space: pre-line; }
        .footer {
            text-align: center;
            margin-top: 26px;
            color: #9CA3AF;
            font-size: 14px;
        }
        .footer a { color: #a855f7; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="topbar">
            <div class="logo">
                <a id="homeLink" href="/"><h1>Blisse</h1></a>
            </div>
            <select id="languageSelect" class="language-select" aria-label="Select language">
                <option value="en">English</option>
                <option value="es">Español</option>
                <option value="pt">Português</option>
            </select>
        </div>

        <div class="card">
            <h2 id="docTitle">Privacy Policy</h2>
            <p id="docDate" class="date">Last Updated: February 2026</p>
            <p id="docIntro" class="intro"></p>
            <div id="docSections"></div>
        </div>

        <div class="footer">
            <p id="footerCopyright">© 2026 Blisse. All rights reserved.</p>
            <p><a id="footerTerms" href="/terms">Terms of Service</a> · <a id="footerPrivacy" href="/privacy">Privacy Policy</a> · <a id="footerDelete" href="/delete-account">Delete Account</a></p>
        </div>
    </div>

    <script>
        const PRIVACY_TRANSLATIONS = {
            en: {
                title: 'Privacy Policy',
                date: 'Last Updated: February 2026',
                intro: 'Your privacy is our highest priority. We understand the sensitive nature of Blisse and have built it to protect your information.',
                sections: [
                    { heading: 'Our Commitment to Privacy', body: 'Blisse is designed with privacy as our highest priority. We understand the sensitive nature of this App and have built it to protect your information.' },
                    { heading: 'Data Stored Locally on Your Device', body: 'Your preferences, favorites, notes, activity history, and settings are stored locally on your device. Authentication is processed by Firebase, and contact or idea messages are sent only when you explicitly submit them through Formspree email delivery.' },
                    { heading: 'Authentication Services', body: 'Sign-in is handled by Apple Sign-In and Firebase Authentication (Google). We do not store passwords or access your credentials directly.' },
                    { heading: 'Anonymous Analytics', body: 'We use PostHog for anonymous, aggregated analytics to improve the App. This includes:\n- Which features are most popular\n- General usage patterns\n- App performance metrics\n\nWe disable person profiling and send only sanitized event metadata. We do not send free-text notes or contact messages to analytics.' },
                    { heading: 'Information We NEVER Collect', body: '- Your biometric data\n- Your photos, contacts, or personal files\n- Your precise location\n- Your free-text notes or support messages in analytics streams\n- Any sale of your personal information' },
                    { heading: 'Third-Party Services', body: 'The App uses:\n- Firebase Authentication (Google)\n- Apple Sign-In\n- PostHog\n- Formspree\n\nEach service has its own privacy policy governing data practices.' },
                    { heading: 'Data Retention', body: 'Your local data persists until you delete your account in the App, reset local data, or uninstall the App. Anonymous analytics data is retained for up to 24 months to analyze long-term trends.' },
                    { heading: "Children's Privacy", body: 'Blisse is strictly for adults 18 years and older. We do not knowingly collect data from anyone under 18.' },
                    { heading: 'Your Rights (GDPR/CCPA)', body: 'You have control over your Blisse data:\n- Access: View your data anytime in the App\n- Deletion: Delete your account in the App via Settings & Security -> Delete Account, or use our Delete Account page\n- Local reset: Clear local-only data from Settings when available\n- Portability: Most personal usage data remains on your device' },
                    { heading: 'Security', body: "We use industry-standard security practices. Local data is protected by your device security. Biometric authentication is handled entirely by your device's secure enclave." },
                    { heading: 'Changes to This Policy', body: 'We may update this Privacy Policy periodically. Continued use after changes constitutes acceptance.' },
                    { heading: 'Governing Law and Jurisdiction', body: 'This Privacy Policy is governed by the laws of the State of Israel. Any dispute is subject to the exclusive jurisdiction of the competent courts in Tel Aviv, Israel.' },
                    { heading: 'Contact Us', body: 'Questions about privacy? Contact us at: blisse.couples@gmail.com' }
                ],
                footerTerms: 'Terms of Service',
                footerPrivacy: 'Privacy Policy',
                footerCopyright: '© 2026 Blisse. All rights reserved.',
                footerDelete: 'Delete Account',
            },
            es: {
                title: 'Política de privacidad',
                date: 'Última actualización: febrero 2026',
                intro: 'Tu privacidad es nuestra prioridad. Diseñamos Blisse para proteger tu información.',
                sections: [
                    { heading: 'Nuestro compromiso con la privacidad', body: 'Blisse fue diseñada con la privacidad como prioridad máxima.' },
                    { heading: 'Datos almacenados localmente', body: 'Tus preferencias, favoritos, notas, historial y configuraciones se almacenan localmente en tu dispositivo. La autenticación se procesa por Firebase y los mensajes de contacto o ideas se envían solo cuando tú decides enviarlos.' },
                    { heading: 'Servicios de autenticación', body: 'El inicio de sesión se gestiona con Apple Sign-In y Firebase Authentication (Google). No almacenamos contraseñas ni credenciales.' },
                    { heading: 'Analítica anónima', body: 'Usamos PostHog para analítica anónima y agregada:\n- funciones más usadas\n- patrones generales de uso\n- métricas de rendimiento\n\nDesactivamos perfiles de personas y enviamos solo metadatos saneados.' },
                    { heading: 'Información que NUNCA recopilamos', body: '- datos biométricos\n- fotos, contactos o archivos personales\n- ubicación precisa\n- notas o mensajes de texto libre en analítica\n- venta de información personal' },
                    { heading: 'Servicios de terceros', body: 'La App usa:\n- Firebase Authentication (Google)\n- Apple Sign-In\n- PostHog\n- Formspree\n\nCada servicio tiene su propia política de privacidad.' },
                    { heading: 'Retención de datos', body: 'Tus datos locales permanecen hasta que elimines tu cuenta en la App, borres datos locales o desinstales la App. Los datos anónimos pueden mantenerse hasta 24 meses.' },
                    { heading: 'Privacidad de menores', body: 'Blisse es solo para adultos de 18 años o más. No recopilamos datos de menores de forma intencional.' },
                    { heading: 'Tus derechos (GDPR/CCPA)', body: 'Tienes control sobre tus datos en Blisse:\n- acceso: ver tus datos en la App\n- eliminación: elimina tu cuenta en la App desde Ajustes y seguridad -> Eliminar cuenta, o usa nuestra página de eliminación de cuenta\n- reinicio local: borra datos guardados localmente desde Ajustes cuando esté disponible\n- portabilidad: la mayor parte del uso personal permanece en tu dispositivo' },
                    { heading: 'Seguridad', body: 'Aplicamos prácticas estándar de seguridad. La biometría la gestiona tu dispositivo.' },
                    { heading: 'Cambios a esta política', body: 'Podemos actualizar esta política periódicamente. El uso continuo implica aceptación.' },
                    { heading: 'Ley aplicable y jurisdicción', body: 'Esta política se rige por las leyes del Estado de Israel. Toda disputa se somete a la jurisdicción exclusiva de los tribunales competentes de Tel Aviv, Israel.' },
                    { heading: 'Contacto', body: 'Preguntas sobre privacidad: blisse.couples@gmail.com' }
                ],
                footerTerms: 'Términos de servicio',
                footerPrivacy: 'Política de privacidad',
                footerCopyright: '© 2026 Blisse. Todos los derechos reservados.',
                footerDelete: 'Eliminar cuenta',
            },
            pt: {
                title: 'Política de privacidade',
                date: 'Última atualização: fevereiro de 2026',
                intro: 'Sua privacidade é nossa maior prioridade. O Blisse foi criado para proteger suas informações.',
                sections: [
                    { heading: 'Nosso compromisso com a privacidade', body: 'O Blisse foi criado com a privacidade como prioridade máxima.' },
                    { heading: 'Dados armazenados localmente', body: 'Preferências, favoritos, notas, histórico e configurações ficam armazenados no seu dispositivo. A autenticação é processada pelo Firebase, e mensagens de contato ou ideias são enviadas apenas quando você decide enviá-las.' },
                    { heading: 'Serviços de autenticação', body: 'O login é feito por Apple Sign-In e Firebase Authentication (Google). Não armazenamos senhas nem credenciais.' },
                    { heading: 'Análise anônima', body: 'Usamos o PostHog para análise anônima e agregada:\n- recursos mais usados\n- padrões gerais de uso\n- métricas de desempenho\n\nDesativamos perfis individuais e enviamos apenas metadados sanitizados.' },
                    { heading: 'Informações que NUNCA coletamos', body: '- dados biométricos\n- fotos, contatos ou arquivos pessoais\n- localização precisa\n- notas ou mensagens de texto livre nos fluxos de análise\n- venda de informações pessoais' },
                    { heading: 'Serviços de terceiros', body: 'O App usa:\n- Firebase Authentication (Google)\n- Apple Sign-In\n- PostHog\n- Formspree\n\nCada serviço possui sua própria política de privacidade.' },
                    { heading: 'Retenção de dados', body: 'Seus dados locais permanecem até que você exclua sua conta no app, apague dados locais ou desinstale o app. Dados anônimos podem ser mantidos por até 24 meses.' },
                    { heading: 'Privacidade infantil', body: 'O Blisse é estritamente para adultos com 18 anos ou mais. Não coletamos dados de menores intencionalmente.' },
                    { heading: 'Seus direitos (GDPR/CCPA)', body: 'Você tem controle sobre seus dados no Blisse:\n- acesso: visualizar seus dados no app\n- exclusão: exclua sua conta no app em Configurações e segurança -> Excluir conta, ou use nossa página de exclusão de conta\n- redefinição local: apague dados salvos localmente em Configurações quando disponível\n- portabilidade: a maior parte do uso pessoal permanece no seu dispositivo' },
                    { heading: 'Segurança', body: 'Aplicamos práticas padrão de segurança. A biometria é gerenciada pelo seu dispositivo.' },
                    { heading: 'Alterações desta política', body: 'Podemos atualizar esta política periodicamente. O uso contínuo do app implica aceitação das alterações.' },
                    { heading: 'Lei aplicável e jurisdição', body: 'Esta política é regida pelas leis do Estado de Israel. Qualquer disputa será submetida à jurisdição exclusiva dos tribunais competentes de Tel Aviv, Israel.' },
                    { heading: 'Contato', body: 'Dúvidas sobre privacidade: blisse.online@gmail.com' }
                ],
                footerTerms: 'Termos de serviço',
                footerPrivacy: 'Política de privacidade',
                footerCopyright: '© 2026 Blisse. Todos os direitos reservados.',
                footerDelete: 'Excluir conta',
            },
        };

        function getInitialLanguage() {
            const params = new URLSearchParams(window.location.search);
            const fromQuery = params.get('lang');
            if (fromQuery && PRIVACY_TRANSLATIONS[fromQuery]) return fromQuery;
            const saved = localStorage.getItem('blisse_site_lang');
            if (saved && PRIVACY_TRANSLATIONS[saved]) return saved;
            const nav = (navigator.language || 'en').toLowerCase();
            if (nav.startsWith('es')) return 'es';
            if (nav.startsWith('pt')) return 'pt';
            return 'en';
        }

        function applyLanguage(lang) {
            const copy = PRIVACY_TRANSLATIONS[lang] || PRIVACY_TRANSLATIONS.en;
            localStorage.setItem('blisse_site_lang', lang);
            document.documentElement.lang = lang === 'pt' ? 'pt-BR' : lang;
            document.title = `${copy.title} - Blisse`;
            document.getElementById('docTitle').textContent = copy.title;
            document.getElementById('docDate').textContent = copy.date;
            document.getElementById('docIntro').textContent = copy.intro;
            document.getElementById('footerTerms').textContent = copy.footerTerms;
            document.getElementById('footerPrivacy').textContent = copy.footerPrivacy;
            document.getElementById('footerCopyright').textContent = copy.footerCopyright;
            document.getElementById('footerDelete').textContent = copy.footerDelete;

            const sections = document.getElementById('docSections');
            sections.innerHTML = '';
            copy.sections.forEach((section) => {
                const sectionEl = document.createElement('section');
                sectionEl.className = 'section';
                const heading = document.createElement('h3');
                heading.textContent = section.heading;
                const body = document.createElement('p');
                body.textContent = section.body;
                sectionEl.appendChild(heading);
                sectionEl.appendChild(body);
                sections.appendChild(sectionEl);
            });

            document.getElementById('languageSelect').value = lang;
            document.getElementById('homeLink').href = `/?lang=${lang}`;
            document.getElementById('footerTerms').href = `/terms?lang=${lang}`;
            document.getElementById('footerPrivacy').href = `/privacy?lang=${lang}`;
            document.getElementById('footerDelete').href = `/delete-account?lang=${lang}`;
        }

        document.getElementById('languageSelect').addEventListener('change', (event) => {
            applyLanguage(event.target.value);
        });

        applyLanguage(getInitialLanguage());
    </script>
</body>
</html>
