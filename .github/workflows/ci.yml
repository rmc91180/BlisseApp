name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: i18n consistency
        run: npm run check:i18n

      - name: Content integrity
        run: npm run check:content

      - name: Expo doctor
        run: npx expo-doctor

      - name: Security audit (production deps)
        run: npm audit --omit=dev
