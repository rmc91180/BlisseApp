        .section p { color: #D1D5DB; white-space: pre-line; }
        .footer {

        function getInitialLanguage() {
            const params = new URLSearchParams(window.location.search);
            const fromQuery = params.get('lang');
            if (fromQuery && TERMS_TRANSLATIONS[fromQuery]) return fromQuery;
            const saved = localStorage.getItem('blisse_site_lang');
            if (saved && TERMS_TRANSLATIONS[saved]) return saved;
            const nav = (navigator.language || 'en').toLowerCase();
            if (nav.startsWith('es')) return 'es';
            if (nav.startsWith('pt')) return 'pt';
            return 'en';
        }

        function applyLanguage(lang) {
            const copy = TERMS_TRANSLATIONS[lang] || TERMS_TRANSLATIONS.en;
            localStorage.setItem('blisse_site_lang', lang);
            document.documentElement.lang = lang === 'pt' ? 'pt-BR' : lang;
            document.title = `${copy.title} - Blisse`;
            document.getElementById('docTitle').textContent = copy.title;
            document.getElementById('docDate').textContent = copy.date;
            document.getElementById('docIntro').textContent = copy.intro;
            document.getElementById('footerTerms').textContent = copy.footerTerms;
            document.getElementById('footerPrivacy').textContent = copy.footerPrivacy;
            document.getElementById('footerCopyright').textContent = copy.footerCopyright;

            const sections = document.getElementById('docSections');
            sections.innerHTML = '';
            copy.sections.forEach((section) => {
                const sectionEl = document.createElement('section');
                sectionEl.className = 'section';
                const heading = document.createElement('h3');
                heading.textContent = section.heading;
                const body = document.createElement('p');
                body.textContent = section.body;
                sectionEl.appendChild(heading);
                sectionEl.appendChild(body);
                sections.appendChild(sectionEl);
            });

            document.getElementById('languageSelect').value = lang;
            document.getElementById('homeLink').href = `/?lang=${lang}`;
            document.getElementById('footerTerms').href = `/terms?lang=${lang}`;
            document.getElementById('footerPrivacy').href = `/privacy?lang=${lang}`;
        }

        document.getElementById('languageSelect').addEventListener('change', (event) => {
            applyLanguage(event.target.value);
        });

        applyLanguage(getInitialLanguage());

</html>
