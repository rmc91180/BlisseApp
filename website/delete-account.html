<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Account - Blisse</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1A0F24 0%, #2D1B3D 100%);
            min-height: 100vh;
            color: #FFF8E7;
            line-height: 1.6;
        }
        .container { max-width: 920px; margin: 0 auto; padding: 32px 20px 44px; }
        .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; gap: 14px; }
        .logo a { text-decoration: none; color: inherit; }
        .logo h1 {
            font-size: 42px;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .language-select {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #FFF8E7;
            border-radius: 10px;
            padding: 8px 10px;
            font-size: 13px;
            font-weight: 600;
        }
        .card {
            background: rgba(45, 27, 61, 0.82);
            border-radius: 16px;
            padding: 28px;
            border: 1px solid rgba(168, 85, 247, 0.2);
        }
        h2 { font-size: 30px; margin-bottom: 6px; }
        .date { color: #9CA3AF; font-size: 14px; margin-bottom: 20px; }
        .intro {
            background: rgba(168, 85, 247, 0.14);
            border-left: 4px solid #a855f7;
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #FFF8E7;
        }
        .section { margin-top: 18px; }
        .section h3 { font-size: 18px; color: #c084fc; margin-bottom: 8px; }
        .section p { color: #D1D5DB; white-space: pre-line; }
        .cta {
            display: inline-block;
            margin-top: 14px;
            padding: 12px 16px;
            border-radius: 12px;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            color: #FFF8E7;
            text-decoration: none;
            font-weight: 700;
        }
        .footer {
            text-align: center;
            margin-top: 26px;
            color: #9CA3AF;
            font-size: 14px;
        }
        .footer a { color: #a855f7; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="topbar">
            <div class="logo">
                <a id="homeLink" href="/"><h1>Blisse</h1></a>
            </div>
            <select id="languageSelect" class="language-select" aria-label="Select language">
                <option value="en">English</option>
                <option value="es">Español</option>
                <option value="pt">Português</option>
            </select>
        </div>

        <div class="card">
            <h2 id="docTitle">Delete Account</h2>
            <p id="docDate" class="date">Last Updated: March 2026</p>
            <p id="docIntro" class="intro"></p>
            <div id="docSections"></div>
            <a id="deleteCta" class="cta" href="mailto:blisse.online@gmail.com?subject=Blisse%20Account%20Deletion%20Request">Email blisse.online@gmail.com</a>
        </div>

        <div class="footer">
            <p id="footerCopyright">© 2026 Blisse. All rights reserved.</p>
            <p><a id="footerTerms" href="/terms">Terms of Service</a> · <a id="footerPrivacy" href="/privacy">Privacy Policy</a> · <a id="footerDelete" href="/delete-account">Delete Account</a></p>
        </div>
    </div>

    <script>
        const DELETE_TRANSLATIONS = {
            en: {
                title: 'Delete Account',
                date: 'Last Updated: March 2026',
                intro: 'You can permanently delete your Blisse account either in the app or by sending us a deletion request from the email address tied to your account.',
                sections: [
                    { heading: 'Option 1: Delete directly in the app', body: 'Open Blisse and go to:\nProfile -> Settings & Security -> Delete Account\n\nYou may be asked to sign in again before deletion is completed.' },
                    { heading: 'Option 2: Request deletion by email', body: 'If you cannot access the app, email blisse.online@gmail.com from the email address connected to your Blisse account.\n\nPlease include:\n- the email address tied to your Blisse account\n- your platform (iPhone or Android)\n- a short note that you want your account deleted' },
                    { heading: 'What happens when your account is deleted', body: 'Deleting your account removes your Blisse authentication account and synced Blisse account data. Local app data stored on your device is also cleared when deletion is completed in the app.' },
                    { heading: 'What may be retained', body: 'We may retain limited records when required for security, fraud prevention, legal compliance, or tax/accounting obligations. App Store, Google Play, and RevenueCat may also retain transaction records under their own policies.' },
                    { heading: 'Need help?', body: 'If you have trouble accessing your account or completing deletion, contact us at blisse.online@gmail.com and we will help you finish the request.' }
                ],
                cta: 'Email blisse.online@gmail.com',
                footerTerms: 'Terms of Service',
                footerPrivacy: 'Privacy Policy',
                footerDelete: 'Delete Account',
                footerCopyright: '© 2026 Blisse. All rights reserved.',
            },
            es: {
                title: 'Eliminar cuenta',
                date: 'Última actualización: marzo 2026',
                intro: 'Puedes eliminar permanentemente tu cuenta de Blisse desde la app o enviándonos una solicitud de eliminación desde el correo asociado a tu cuenta.',
                sections: [
                    { heading: 'Opción 1: Eliminar directamente en la app', body: 'Abre Blisse y ve a:\nPerfil -> Ajustes y seguridad -> Eliminar cuenta\n\nEs posible que te pidamos iniciar sesión nuevamente antes de completar la eliminación.' },
                    { heading: 'Opción 2: Solicitar la eliminación por correo', body: 'Si no puedes acceder a la app, escribe a blisse.online@gmail.com desde el correo asociado a tu cuenta de Blisse.\n\nIncluye:\n- el correo vinculado a tu cuenta de Blisse\n- tu plataforma (iPhone o Android)\n- una nota breve indicando que deseas eliminar tu cuenta' },
                    { heading: 'Qué ocurre cuando se elimina tu cuenta', body: 'Eliminar tu cuenta borra tu cuenta de autenticación de Blisse y los datos sincronizados de tu cuenta Blisse. Los datos locales almacenados en tu dispositivo también se limpian cuando la eliminación se completa dentro de la app.' },
                    { heading: 'Qué puede conservarse', body: 'Podemos conservar registros limitados cuando sea necesario por seguridad, prevención de fraude, cumplimiento legal o obligaciones fiscales/contables. App Store, Google Play y RevenueCat también pueden conservar registros de transacciones conforme a sus propias políticas.' },
                    { heading: '¿Necesitas ayuda?', body: 'Si tienes problemas para acceder a tu cuenta o completar la eliminación, escríbenos a blisse.online@gmail.com y te ayudaremos a finalizar la solicitud.' }
                ],
                cta: 'Escribir a blisse.online@gmail.com',
                footerTerms: 'Términos de servicio',
                footerPrivacy: 'Política de privacidad',
                footerDelete: 'Eliminar cuenta',
                footerCopyright: '© 2026 Blisse. Todos los derechos reservados.',
            },
            pt: {
                title: 'Excluir conta',
                date: 'Última atualização: março de 2026',
                intro: 'Você pode excluir permanentemente sua conta do Blisse no app ou enviando uma solicitação de exclusão pelo e-mail vinculado à sua conta.',
                sections: [
                    { heading: 'Opção 1: Excluir diretamente no app', body: 'Abra o Blisse e vá para:\nPerfil -> Configurações e segurança -> Excluir conta\n\nPodemos solicitar que você faça login novamente antes da exclusão ser concluída.' },
                    { heading: 'Opção 2: Solicitar exclusão por e-mail', body: 'Se você não conseguir acessar o app, envie um e-mail para blisse.online@gmail.com usando o endereço vinculado à sua conta Blisse.\n\nInclua:\n- o e-mail vinculado à sua conta Blisse\n- sua plataforma (iPhone ou Android)\n- uma nota breve dizendo que deseja excluir sua conta' },
                    { heading: 'O que acontece quando sua conta é excluída', body: 'Excluir sua conta remove sua conta de autenticação do Blisse e os dados sincronizados da sua conta Blisse. Os dados locais armazenados no seu dispositivo também são apagados quando a exclusão é concluída no app.' },
                    { heading: 'O que pode ser retido', body: 'Podemos reter registros limitados quando isso for necessário para segurança, prevenção a fraudes, conformidade legal ou obrigações fiscais/contábeis. App Store, Google Play e RevenueCat também podem manter registros de transações conforme suas próprias políticas.' },
                    { heading: 'Precisa de ajuda?', body: 'Se você tiver dificuldade para acessar sua conta ou concluir a exclusão, escreva para blisse.online@gmail.com e vamos ajudar a finalizar a solicitação.' }
                ],
                cta: 'Enviar e-mail para blisse.online@gmail.com',
                footerTerms: 'Termos de serviço',
                footerPrivacy: 'Política de privacidade',
                footerDelete: 'Excluir conta',
                footerCopyright: '© 2026 Blisse. Todos os direitos reservados.',
            },
        };

        function getInitialLanguage() {
            const params = new URLSearchParams(window.location.search);
            const fromQuery = params.get('lang');
            if (fromQuery && DELETE_TRANSLATIONS[fromQuery]) return fromQuery;
            const saved = localStorage.getItem('blisse_site_lang');
            if (saved && DELETE_TRANSLATIONS[saved]) return saved;
            const nav = (navigator.language || 'en').toLowerCase();
            if (nav.startsWith('es')) return 'es';
            if (nav.startsWith('pt')) return 'pt';
            return 'en';
        }

        function applyLanguage(lang) {
            const copy = DELETE_TRANSLATIONS[lang] || DELETE_TRANSLATIONS.en;
            localStorage.setItem('blisse_site_lang', lang);
            document.documentElement.lang = lang === 'pt' ? 'pt-BR' : lang;
            document.title = `${copy.title} - Blisse`;
            document.getElementById('docTitle').textContent = copy.title;
            document.getElementById('docDate').textContent = copy.date;
            document.getElementById('docIntro').textContent = copy.intro;
            document.getElementById('deleteCta').textContent = copy.cta;
            document.getElementById('deleteCta').href = `mailto:blisse.online@gmail.com?subject=${encodeURIComponent(copy.title + ' Request')}`;
            document.getElementById('footerTerms').textContent = copy.footerTerms;
            document.getElementById('footerPrivacy').textContent = copy.footerPrivacy;
            document.getElementById('footerDelete').textContent = copy.footerDelete;
            document.getElementById('footerCopyright').textContent = copy.footerCopyright;

            const sections = document.getElementById('docSections');
            sections.innerHTML = '';
            copy.sections.forEach((section) => {
                const sectionEl = document.createElement('section');
                sectionEl.className = 'section';
                const heading = document.createElement('h3');
                heading.textContent = section.heading;
                const body = document.createElement('p');
                body.textContent = section.body;
                sectionEl.appendChild(heading);
                sectionEl.appendChild(body);
                sections.appendChild(sectionEl);
            });

            document.getElementById('languageSelect').value = lang;
            document.getElementById('homeLink').href = `/?lang=${lang}`;
            document.getElementById('footerTerms').href = `/terms?lang=${lang}`;
            document.getElementById('footerPrivacy').href = `/privacy?lang=${lang}`;
            document.getElementById('footerDelete').href = `/delete-account?lang=${lang}`;
        }

        document.getElementById('languageSelect').addEventListener('change', (event) => {
            applyLanguage(event.target.value);
        });

        applyLanguage(getInitialLanguage());
    </script>
</body>
</html>
